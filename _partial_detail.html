<script>
/**
 * HTML에 삽입된 JSON 데이터를 파싱하고, Highcharts를 위한 전역 변수를 설정합니다.
 * ⭐ 이 함수는 테이블 생성 스크립트가 주석 처리되더라도 차트가 작동하도록 전역 변수를 설정합니다.
 */
function getJsonIlbong(code) {
    const scriptTag = document.getElementById('json_' + code);
    const basicTag = document.getElementById('json_basic_' + code);
    
    if (!scriptTag) {
        console.warn(`[데이터 없음] json_${code} 태그를 찾을 수 없습니다.`);
        return null;
    }

    try {
        // 1. 텍스트가 비어있는지 확인
        const rawContent = scriptTag.textContent.trim();
        if (!rawContent || rawContent === "None" || rawContent === "") {
            console.error(`[데이터 오류] ${code}의 JSON 내용이 비어있습니다.`);
            window.currentIlbongData = [];
            return null;
        }

        // 2. 파싱 시도
        const ilbongData = JSON.parse(rawContent);
        window.currentIlbongData = Array.isArray(ilbongData) ? ilbongData : [];

        // 3. 기본 정보 파싱
        if (basicTag && basicTag.textContent.trim()) {
            window.currentBasicData = JSON.parse(basicTag.textContent.trim());
        } else {
            window.currentBasicData = [];
        }

        window.currentChartCode = code;
        console.log(`[성공] ${code} 데이터 로드 완료:`, window.currentIlbongData.length, "건");

    } catch(e) {
        // 파싱 에러 발생 시 콘솔에 원인 출력하고 빈 배열 할당
        console.error(`[파싱 에러] 종목코드 ${code}의 데이터 형식이 잘못되었습니다:`, e);
        window.currentIlbongData = [];
        window.currentBasicData = [];
        return null;
    }
}

</script>



<script>
(function() {
    const code = "{{ code }}"; 
    getJsonIlbong(code);
})();
</script>

<script>
(function(){
    const code = "{{ code }}";
    const rawData = window.currentIlbongData; // [{date, close, volume, 종목명, high, low}, ...]
    if (!rawData || rawData.length === 0) return;

    function yyyymmddToUTC(dateStr) {
        const year = parseInt(dateStr.slice(0,4), 10);
        const month = parseInt(dateStr.slice(4,6), 10) - 1;
        const day = parseInt(dateStr.slice(6,8), 10);
        return Date.UTC(year, month, day);
    }

    function processDaily(data) {
        const ohlc = [], volume = [], seenDates = new Set();
        const individual = [] // 개인
        const institute = []  // 기관
        const foreign = []    // 외국인



        data.forEach((row, i) => {
            const time = yyyymmddToUTC(row.date.toString());
            if (seenDates.has(time)) return;
            seenDates.add(time);

            const close = Number(row.close.toString().replace(/,/g,'')); 
            // ⭐ 1. 시가(Open) 설정: row.open 값이 있으면 사용, 없으면 임시로 종가와 동일하게 설정
            const open = Number(row.open?.toString().replace(/,/g,'')) || close;
            
            // ⭐ 2. 고가(High) 설정: high 값이 없으면 open/close 중 큰 값 사용
            const high = Number(row.high?.toString().replace(/,/g,'')) || Math.max(open, close);
            
            // ⭐ 3. 저가(Low) 설정: low 값이 없으면 open/close 중 작은 값 사용
            const low  = Number(row.low?.toString().replace(/,/g,'')) || Math.min(open, close);

            // 4. Highcharts OHLC 배열 생성 (Time, Open, High, Low, Close)
            ohlc.push([time, open, high, low, close]);
            volume.push([time, Number(row.volume.toString().replace(/,/g,''))]);

            // 5. row.개인, row.기관, row.외국인 속성 사용
            individual.push([time, Number(row.개인.toString().replace(/,/g,''))]);
            institute.push([time, Number(row.기관.toString().replace(/,/g,''))]);
            foreign.push([time, Number(row.외국인.toString().replace(/,/g,''))]);

        });
        ohlc.sort((a,b)=>a[0]-b[0]);
        volume.sort((a,b)=>a[0]-b[0]);
        individual.sort((a,b)=>a[0]-b[0]);
        institute.sort((a,b)=>a[0]-b[0]);
        foreign.sort((a,b)=>a[0]-b[0]);
        
        return { ohlc, volume, individual, institute, foreign };
    }


    function aggregateData(data, type='week') {
        const ohlcMap = new Map();
        const supplyMap = new Map();

        

        data.forEach((row,i)=>{
            const date = yyyymmddToUTC(row.date.toString());
            let key;
            if(type==='week'){
                const d = new Date(date);
                const day = d.getUTCDay();
                d.setUTCDate(d.getUTCDate() - day + 1); // 월요일 기준
                key = d.getTime();
            } else if(type==='month'){
                const d = new Date(date);
                d.setUTCDate(1);
                key = d.getTime();
            } else {
                key = date;
            }

            const close = Number(row.close.toString().replace(/,/g,''));
            // ⭐ 시가 설정: row.open 사용 (없으면 close와 동일)
            const open = Number(row.open?.toString().replace(/,/g,'')) || close;
            // ⭐ 고가/저가 설정: row.high, row.low 사용 (없으면 close와 동일)
            const high = Number(row.high?.toString().replace(/,/g,'')) || close;
            const low  = Number(row.low?.toString().replace(/,/g,'')) || close;
            const vol  = Number(row.volume.toString().replace(/,/g,''));

            if(!ohlcMap.has(key)){
                // ⭐ 첫 번째 데이터의 open을 해당 주/월의 시가로 설정
                ohlcMap.set(key, { open, high, low, close, volume: vol });
            } else {
                const item = ohlcMap.get(key);
                item.high = Math.max(item.high, high);
                item.low  = Math.min(item.low, low);
                // 마지막 데이터의 close가 해당 주/월의 종가가 됩니다.
                item.close = close; 
                item.volume += vol;
            }

            if (!supplyMap.has(key)) {
                supplyMap.set(key, { 
                    individual: Number(row.개인), 
                    institute: Number(row.기관), 
                    foreign: Number(row.외국인) 
                });
            } else {
                const sdItem = supplyMap.get(key);
                sdItem.individual += Number(row.개인);
                sdItem.institute += Number(row.기관);
                sdItem.foreign += Number(row.외국인);
            }
        });


        const ohlc = [], volume = [];
        const individual = [], institute = [], foreign = [];
        
        Array.from(ohlcMap.keys()).sort((a,b)=>a-b).forEach(time=>{
            const item = ohlcMap.get(time);
            const actualHigh = item.high > Math.max(item.open, item.close) ? item.high : Math.max(item.open, item.close);
            const actualLow  = item.low  < Math.min(item.open, item.close) ? item.low  : Math.min(item.open, item.close);
            ohlc.push([time, item.open, actualHigh, actualLow, item.close]);
            volume.push([time, item.volume]);

            const sdItem = supplyMap.get(time);
            individual.push([time, sdItem.individual]);
            institute.push([time, sdItem.institute]);
            foreign.push([time, sdItem.foreign]);

        });
        return { ohlc, volume, individual, institute, foreign };
    }

    




    let chart;
    
    function renderChart(ohlc, volume, individual, institute, foreign){
        if(chart) chart.destroy();    

        const coloredVolume = volume.map((v, i) => {
                const candle = ohlc[i];
                // candle[4] = 종가 (Close), candle[1] = 시가 (Open)
                // 종가 >= 시가(양봉)이면 빨강(#FF0000), 아니면 파랑(#0000FF)
                const color = candle[4] >= candle[1] ? '#FF0000' : '#0000FF'; 
                
                return {
                    x: v[0], // Time
                    y: v[1], // Volume
                    color: color
                };
            });




                                         

        chart = Highcharts.stockChart('container_{{ code }}', {








            chart: {
                spacingRight: 50,   // 금액 라벨 위해 유지

                // ⭐️ 정중앙 종목명 워터마크 이벤트 구문 시작
                events: {
                    render: function () {
                        const chart = this;
                        
                        // 기존에 그려진 종목명 워터마크가 있다면 안전하게 제거
                        if (chart.watermarkText) {
                            chart.watermarkText.destroy();
                        }

                        // 1. 일봉 차트 영역의 상단 Y 좌표 및 가로 너비 가져오기
                        const plotLeft = chart.plotLeft;
                        const plotTop = chart.plotTop;     
                        const plotWidth = chart.plotWidth;

                        // 2. 좌표 계산: 가로는 정중앙, 세로는 위 경계면에 안착
                        const centerX = plotLeft + (plotWidth / 2);
                        const topY = plotTop + 38; // 💡 요청하신 topY = plotTop + 38; 유지

                        // 3. 변수 존재 여부를 단계별로 안전하게 체크 (TypeError 완벽 차단)
                        let stockName = '';
                        if (window.currentBasicData && Array.isArray(window.currentBasicData) && window.currentBasicData.length > 0) {
                            if (window.currentBasicData[0] && window.currentBasicData[0][1]) {
                                stockName = window.currentBasicData[0][1];
                            }
                        }

                        // 만약 전역 변수가 비어 있다면 화면에 뿌려진 basicTable 텍스트에서 직접 추출 (2중 안전장치)
                        if (!stockName) {
                            const basicTableDiv = document.getElementById('basicTable_{{ code }}');
                            if (basicTableDiv) {
                                const firstDiv = basicTableDiv.querySelector('div');
                                if (firstDiv) stockName = firstDiv.innerText.trim();
                            }
                        }

                        // 4. 텍스트를 위 경계선 영역에 지정하신 스타일로 선명하게 렌더링
                        if (stockName && stockName !== '종목명 없음') {
                            chart.watermarkText = chart.renderer.text(stockName, centerX, topY)
                                .css({
                                    fontSize: '38px',                  // 💡 요청하신 글자 크기 38px
                                    fontWeight: 'bold',
                                    color: 'rgba(30, 144, 255, 0.8)', // 💡 요청하신 진하기 0.8 선명도 유지
                                    textAnchor: 'middle',             // 가로 기준 정중앙 정렬
                                    dominantBaseline: 'auto',         // 기준점을 글자 상단으로 맞춰서 경계면에 안착
                                    zIndex: 1                         // 일봉과 이쁘게 겹치도록 설정
                                })
                                .add();
                        }
                    }
                } // 👈 events 닫기
                
            }, // chart


















































            
            xAxis: {                 // 일자 표시
                offset:-187,         // 높이
                labels: { style: { fontSize: '10px' } }
            },









            navigator: {
                height: 20,       // navigator 높이 (기본 40)
                margin: -180      // plot 영역과 navigator 사이 간격
            },


            accessibility: { enabled: false },

            macdTop = 488 - 30 - 78;
            supplyTop = 587 - 207;            
        }




















                                   
        if (volumeChecked) {
            // 거래량 보이기: 높이 38, top 350
            volumeAxis.update({
                height: '38',
                top: '343', // ⭐ '378'이 아닌 '350'이 맞습니다 (캔들 300 + 공백 50)
                minPadding: 0, maxPadding: 0
            }, false);
        } else {
                // 거래량 숨기기: 높이 0
                volumeAxis.update({
                    height: 0,
                    top: '343', // 위치는 유지해도 되지만 높이를 0으로 설정
                    minPadding: 0, maxPadding: 0
                }, false);
        }



        if (rsiChecked) {
            rsiAxis.update({
                top: rsiTop, // 계산된 위치 적용
                height: '70',
                minPadding: 0, maxPadding: 0,
                labels: {enabled: true }
                }, false);
        } else {
            rsiAxis.update({
                top: rsiTop, // 계산된 위치 적용
                height: '0',
                minPadding: 0, maxPadding: 0,
                labels: {enabled: false }
                }, false);
        }


        if (macdChecked) {
            macdAxis.update({
                top: macdTop, // 여기에 동적으로 계산된 값을 넣을 수 있습니다.
                height: '90',
                minPadding: 0, maxPadding: 0,
                labels: {enabled: true }}, false);
        } else {
            macdAxis.update({
                top: macdTop, // 여기에 동적으로 계산된 값을 넣을 수 있습니다.
                height: '0',
                minPadding: 0, maxPadding: 0,
                labels: {enabled: false }}, false);
        }




        if (supplyChecked) {
            document.getElementById('supply-legend-' + code).style.display = '';     // 수급 범례
            document.getElementById('supply-legend-' + code).style.top = supplyTop + 21;

            // 외국인 보이기: 높이 38, top 350
            supplyAxis.update({
                height: '100',
                top: supplyTop,
                minPadding: 0, maxPadding: 0
            }, false);

            
        } else {
            document.getElementById('supply-legend-' + code).style.display = 'none';     // 수급 범례

            // 외국인 보이기: 높이 0
            supplyAxis.update({
                height: '0',
                top: supplyTop,
                minPadding: 0, maxPadding: 0
            }, false);
            

        }


        





        chart.xAxis[0].update({ labels: { style: { fontSize: '10px' } } }, false);


        


        chart.xAxis[0].update({ top: top_xAxis }, false);    // 일자축 출력


        chart.update({
           //     tooltip: { enabled: false },
            navigator: { enabled: naviChecked,}, // 네비 체크할 때만 네비 배경 표시
            scrollbar: { enabled: naviChecked }  // 네비 체크할 때만 네비 스크롤 표시
            }, false); // 아직 redraw 하지 않음



        // 네비게이터 내부 요소의 표시/숨김은 유지
        const selectors = [
            '.highcharts-navigator-series',
            '.highcharts-navigator-xaxis',
            '.highcharts-navigator-mask-inside',
            '.highcharts-navigator-outline',
            '.highcharts-navigator-handle',
            ];

        selectors.forEach(sel => { chart.container.querySelectorAll(sel).forEach(el => { el.style.display = naviChecked ? '' : 'none'; }); });






        document.getElementById('toggle-ma-{{ code }}').addEventListener('change', function () {
            const visible = this.checked;

            ['ma5', 'ma20', 'ma60', 'ma120'].forEach(id => {
                const s = chart.get(id);
                if (s) s.setVisible(visible, false);
            });

            });


        document.getElementById('toggle-ema26-{{ code }}').addEventListener('change', function () {
            const visible = this.checked;
            const s = chart.get('ema26');
            if (s) s.setVisible(visible, false);
            chart.redraw();
        });




        const bbCheckbox = document.getElementById('toggle-bb-' + code);
        bbCheckbox.addEventListener('change', () => {
            chart.get('bb').setVisible(bbCheckbox.checked);
        });

        const ikhCheckbox = document.getElementById('toggle-ikh-' + code);
        ikhCheckbox.addEventListener('change', () => {
            chart.get('ikh').setVisible(ikhCheckbox.checked);
        });




        
        
        chart.redraw();
    }



    // 체크박스 이벤트
    if (volumeCheckbox) volumeCheckbox.addEventListener('change', updateOffsets);
    if (rsiCheckbox) rsiCheckbox.addEventListener('change', updateOffsets);
    if (macdCheckbox) macdCheckbox.addEventListener('change', updateOffsets);
    if (supplyCheckbox) supplyCheckbox.addEventListener('change', updateOffsets);        
    if (navigatorCheckbox) navigatorCheckbox.addEventListener('change', updateOffsets);


    
    updateOffsets();   // 초기 적용


})();













// ================================================================
    // 💡 [체크박스 설정 관리 시스템] DuckDB 연동 스크립트
    // ================================================================

    // 1. [SELECT] 장고 뷰(partial_detail_view)가 넘겨준 저장된 설정값 읽기
    // 데이터가 없거나 에러일 경우를 대비해 '{}' 문자열을 안전하게 파싱합니다.
    let savedCheckConfig = {};
    try {
        savedCheckConfig = JSON.parse('{{ saved_settings|safe }}' || '{}');
    } catch (e) {
        console.error("저장된 체크 설정을 파싱하는 중 오류 발생:", e);
    }

    // 2. [초기 복원] 저장된 상태에 맞게 체크박스 체크 세팅 및 차트 반영
    if (savedCheckConfig && Object.keys(savedCheckConfig).length > 0) {
        // 복원할 체크박스 ID 목록 (실제 HTML에 정의된 id 이름과 정확히 매칭해야 합니다)
        const checkIds = ['volume', 'rsi', 'macd', 'supply', 'navigator', 'ma5', 'ma20', 'ma60', 'ma120', 'bb', 'ikh'];
        
        checkIds.forEach(key => {
            if (savedCheckConfig[key] !== undefined) {
                // 예: toggle-volume-005930 또는 toggle-bb-005930 형태의 ID를 찾습니다.
                const targetCheckbox = document.getElementById(`toggle-${key}-{{ code }}`) || document.getElementById(`toggle-${key}-` + code);
                
                if (targetCheckbox) {
                    // 저장되어 있던 true/false 값을 체크박스에 강제 주입
                    targetCheckbox.checked = savedCheckConfig[key];
                    
                    // 💡 중요: 체크박스 값만 바꾸면 차트가 안 변하므로, 
                    // 강제로 'change' 이벤트를 발생시켜 하이차트 보이기/숨기기 함수를 실행시킵니다.
                    targetCheckbox.dispatchEvent(new Event('change'));
                }
            }
        });
    }

    // 3. [UPDATE] "지표 설정 저장" 버튼 클릭 이벤트 연결
    const saveSettingBtn = document.getElementById('btn-save-check-setting');
    if (saveSettingBtn) {
        saveSettingBtn.addEventListener('click', function() {
            // 현재 화면에 있는 체크박스들의 상태를 하나의 딕셔너리 객체로 취합
            const currentConfig = {
                volume: (document.getElementById('toggle-volume-{{ code }}') || document.getElementById('toggle-volume-' + code))?.checked,
                rsi: (document.getElementById('toggle-rsi-{{ code }}') || document.getElementById('toggle-rsi-' + code))?.checked,
                macd: (document.getElementById('toggle-macd-{{ code }}') || document.getElementById('toggle-macd-' + code))?.checked,
                supply: (document.getElementById('toggle-supply-{{ code }}') || document.getElementById('toggle-supply-' + code))?.checked,
                navigator: (document.getElementById('toggle-navigator-{{ code }}') || document.getElementById('toggle-navigator-' + code))?.checked,
                ma5: (document.getElementById('toggle-ma5-{{ code }}'))?.checked,
                ma20: (document.getElementById('toggle-ma20-{{ code }}'))?.checked,
                ma60: (document.getElementById('toggle-ma60-{{ code }}'))?.checked,
                ma120: (document.getElementById('toggle-ma120-{{ code }}'))?.checked,
                bb: (document.getElementById('toggle-bb-{{ code }}') || document.getElementById('toggle-bb-' + code))?.checked,
                ikh: (document.getElementById('toggle-ikh-{{ code }}') || document.getElementById('toggle-ikh-' + code))?.checked
            };

            // 장고 백엔드로 POST 비동기 요청 전송
            fetch('/save_check_setting/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // views.py에 @csrf_exempt를 붙여두었기 때문에 토큰 처리가 생략되어 안전하게 통신됩니다.
                },
                body: JSON.stringify({
                    settings: JSON.stringify(currentConfig) // 전체 설정을 문자열 한 덩어리로 변환
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    alert('🔔 현재 체크박스 설정이 DuckDB에 업데이트되었습니다!\n(이제 다른 PC로 복사해도 유지됩니다.)');
                } else {
                    alert('❌ 설정 저장 실패: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('❌ 서버 통신 오류가 발생했습니다.');
            });
        });
    }






</script>
