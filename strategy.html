{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>📊 매매전략</title>
  <style>
    @import url("{% static 'pretendard/pretendard.css' %}");
    
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background-color: #ffffff; 
      margin: 25px;
      color: #1e293b;
    }
    
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f1f5f9;
      padding-bottom: 14px; /* 헤더 여백도 살짝 축소 */
      margin-bottom: 20px;
      width: 100%;
    }
    
    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
    }
    
    .back-btn {
      padding: 6px 14px;
      background-color: #64748b;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      font-size: 13.5px;
    }
    
    .back-btn:hover {
      background-color: #475569;
    }
    
    .strategy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(calc(14.285% - 13px), 1fr));
      gap: 12px; /* 격자 간격도 15px -> 12px로 줄여 컴팩트하게 밀착 */
      width: 100%;
    }
    
    .strategy-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px 16px; /* 💡 상하 패딩을 20px -> 14px로 대폭 줄여 높이 축소 */
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
      min-height: 65px;   /* 💡 최소 높이를 100px -> 65px로 낮춰 슬림하게 빌드 */
    }
    
    .strategy-card:hover {
      cursor: pointer;
      background-color: #fcfcff;
      border-color: #cbcbf6;
      box-shadow: 0 8px 12px -3px rgba(59, 130, 246, 0.04);
    }
    
    .strategy-name {
      font-size: 19px; 
      font-weight: 700;
      margin-bottom: 6px; /* 💡 제목과 설명 사이 간격 축소 */
      color: #0f172a; 
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .strategy-desc {
      font-size: 14px; 
      color: #334155; 
      line-height: 1.4; /* 💡 행간을 1.5 -> 1.4로 미세하게 좁혀 수직 공간 절약 */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @media (max-width: 1500px) {
      .strategy-grid {
        grid-template-columns: repeat(auto-fill, minmax(calc(25% - 10px), 1fr));
      }
    }

    @media (max-width: 1024px) {
      .strategy-grid {
        grid-template-columns: repeat(auto-fill, minmax(calc(33.333% - 8px), 1fr));
      }
    }
    
    @media (max-width: 640px) {
      .strategy-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="header-container">
    <h1>📊 매매전략</h1>
    <a href="{% url 'index' %}" class="back-btn">← 메인 페이지</a>
  </div>

  <div class="strategy-grid">
    {% for strategy in strategies %}
      <div class="strategy-card" onclick="location.href='/{{ strategy.id }}/'">
        <div class="strategy-name" title="{{ strategy.name }}">{{ strategy.name }}</div>
        <div class="strategy-desc">{{ strategy.desc }}</div>
      </div>
    {% empty %}
      <p style="color: #94a3b8;">등록된 매매 전략이 없습니다.</p>
    {% endfor %}
  </div>

</body>
</html>
